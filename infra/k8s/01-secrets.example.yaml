apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: fraud-detection
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: fraud_detection
