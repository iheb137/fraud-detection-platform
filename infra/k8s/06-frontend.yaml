apiVersion: v1
kind: Service
metadata:
  name: fraud-frontend
  namespace: fraud-detection
spec:
  type: LoadBalancer
  selector:
    app: fraud-frontend
  ports:
    - port: 8090
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-frontend
  namespace: fraud-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-frontend
  template:
    metadata:
      labels:
        app: fraud-frontend
    spec:
      containers:
        - name: frontend
          image: fraud-frontend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: "fraud-backend"
            - name: ML_HOST
              value: "fraud-ml"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"