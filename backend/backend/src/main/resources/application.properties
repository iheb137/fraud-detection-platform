spring.application.name=fraud-detection-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud_detection
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:p}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.port=8081
jwt.secret=${JWT_SECRET:frauddetectionsupersecretkey2025tt}
jwt.expiration=3600000
jwt.refresh-expiration=86400000
ml.service.url=http://localhost:8000
ml.service.api-key=${ML_SERVICE_API_KEY:mlapikey}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
logging.level.com.tunisietelecom=DEBUG
spring.jpa.open-in-view=false
# === Kafka - ingestion CDR temps reel ===
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-platform
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.listener.missing-topics-fatal=false