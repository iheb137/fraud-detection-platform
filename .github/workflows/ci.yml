name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  backend-tests:
    name: Backend - tests JUnit + couverture
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Tests unitaires
        run: mvn -B test -Dtest='!BackendApplicationTests' -DfailIfNoTests=false
      - name: Rapport de tests JUnit (detail + annotations)
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        if: always()
        with:
          report_paths: 'backend/backend/target/surefire-reports/TEST-*.xml'
          check_name: Resultats tests backend
          detailed_summary: true
          include_passed: true
      - name: Couverture JaCoCo dans le resume
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            echo "### Couverture backend (JaCoCo)" >> $GITHUB_STEP_SUMMARY
            awk -F, 'NR>1 {t+=$4+$5; c+=$5} END {printf "Instructions couvertes : **%.1f%%** (%d / %d)\n", 100*c/t, c, t}' target/site/jacoco/jacoco.csv >> $GITHUB_STEP_SUMMARY
          fi
      - name: Publier le rapport de couverture JaCoCo
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-report
          path: backend/backend/target/site/jacoco/

  frontend-build:
    name: Frontend - tests Vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Tests Vitest
        run: |
          set -o pipefail
          npx ng test --watch=false 2>&1 | tee vitest.log
          echo "### Tests frontend (Vitest)" >> $GITHUB_STEP_SUMMARY
          grep -E "Test Files|Tests " vitest.log | sed 's/^ *//' >> $GITHUB_STEP_SUMMARY
      - name: Build production
        run: npx ng build --configuration production

  ml-checks:
    name: ML - tests pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements-docker.txt
      - run: pip install pytest
      - run: python -m compileall app simulator
      - name: Tests pytest
        run: python -m pytest tests -v --junitxml=pytest-report.xml
      - name: Rapport pytest (detail + annotations)
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        if: always()
        with:
          report_paths: 'ml-service/pytest-report.xml'
          check_name: Resultats tests ML
          detailed_summary: true
          include_passed: true

  docker-publish:
    name: Publication Docker Hub
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-build, ml-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build et push backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-backend:${{ github.sha }}
      - name: Build et push ml
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ml-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-ml:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-ml:${{ github.sha }}
      - name: Build et push frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-frontend:${{ github.sha }}