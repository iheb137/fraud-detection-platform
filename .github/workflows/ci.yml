name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Tests unitaires
        run: mvn -B test -Dtest='!BackendApplicationTests' -DfailIfNoTests=false

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng build --configuration production

  ml-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements-docker.txt
      - run: python -m compileall app simulator

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-build, ml-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build et push backend
        uses: docker/build-push-action@v6
        with:
          context: backend/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-backend:${{ github.sha }}
      - name: Build et push ml
        uses: docker/build-push-action@v6
        with:
          context: ml-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-ml:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-ml:${{ github.sha }}
      - name: Build et push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-frontend:${{ github.sha }}